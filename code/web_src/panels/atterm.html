<div class="panel" id="panel-atterm">
      <h1 class="page-title">AT 指令终端</h1>
      <p class="page-subtitle">直接向模组发送 AT 指令并接收响应</p>
      <div class="card">
        <div class="card-header">终端</div>
        <div class="card-body">
          <div id="atLog">就绪 — 输入 AT 指令开始调试</div>
          <div class="at-chips">
            <button type="button" class="at-chip" onclick="atQuick('AT+CSQ')">信号</button>
            <button type="button" class="at-chip" onclick="atQuick('AT+CEREG?')">注册状态</button>
            <button type="button" class="at-chip" onclick="atQuick('AT+COPS?')">运营商</button>
            <button type="button" class="at-chip" onclick="atQuick('AT+CGPADDR=1')">PDP IP</button>
            <button type="button" class="at-chip" onclick="atQuick('AT+CPMS?')">短信存储</button>
            <button type="button" class="at-chip" onclick="atQuick('AT+CGSN')">IMEI</button>
          </div>
          <div class="at-bar"><input class="form-input" type="text" id="atCmd" placeholder="AT+CSQ　（↑/↓ 翻阅历史命令）"><button class="btn btn-primary btn-sm" onclick="sendAT()" id="atBtn">发送</button></div>
          <div class="btn-row" style="margin-top:8px;"><button class="btn btn-secondary btn-sm" onclick="clearATLog()">清空日志</button></div>
          <p class="form-hint">直接向模组串口发送指令并接收响应，请谨慎操作；常用指令可点上方快捷按钮，输入框支持 ↑/↓ 历史</p>
        </div>
      </div>
    </div>

    <!-- ===== System Log ===== -->
